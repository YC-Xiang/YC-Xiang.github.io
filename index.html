<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>VS Code Redirector...</title>
    <script>
      window.onload = function () {
        // 检查 URL 中是否包含 '#'
        if (/#/.test(document.location.href)) {
          // 提取 '#' 后面的内容（去除了原始正则里多余的转义符）
          var uri = document.location.hash.replace(/^#/, "");

          // 执行重定向，唤起本地应用
          if (uri) {
            window.location.href = uri;

            // 可选：尝试在重定向后自动关闭当前浏览器标签页
            setTimeout(function () {
              window.close();
            }, 500);
          }
        } else {
          document.body.innerHTML = "<h3>参数错误：缺少本地协议 URI</h3>";
        }
      };
    </script>
  </head>
  <body>
    <p>正在尝试打开本地文件...</p>
  </body>
</html>
